function show(n) {
  var ss = document.querySelectorAll(".s");
  for (var i = 0; i < ss.length; i++) ss[i].classList.remove("on");
  document.getElementById("s" + n).classList.add("on");
  if (n === 1) renderG();
}

function sf(a) {
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function pk(a) { return a[Math.floor(Math.random() * a.length)]; }

document.getElementById("btnStart").onclick = function() {
  S.clr = []; S.bu = false;
  show(1);
};

function renderG() {
  var g = document.getElementById("grid");
  var h = "";
  var all = CL.slice();
  all.push("j");
  for (var i = 0; i < all.length; i++) {
    var id = all[i];
    var ib = (id === "j");
    var c = CH[id];
    var ic = S.clr.indexOf(id) !== -1;
    var il = ib && S.clr.length < 9;
    var cls = "cc";
    if (ic) cls += " cl";
    if (il) cls += " lk";
    h += "<div class=\"" + cls + "\" onclick=\"oi('" + id + "')\">";
    if (ib) h += "<span class=\"bb\">BOSS</span>";
    h += "<span class=\"e\">" + c.e + "</span>";
    h += "<div class=\"n\">" + c.n + "</div>";
    h += "<div class=\"t\">" + c.t + "</div>";
    h += "<div class=\"h\">HP " + c.h + "</div></div>";
  }
  g.innerHTML = h;
}

function oi(id) {
  if (id === "j" && S.clr.length < 9) return;
  if (S.clr.indexOf(id) !== -1) return;
  S.ci = id;
  S.di = 0;
  var c = CH[id];
  document.getElementById("ie").textContent = c.e;
  document.getElementById("in").textContent = c.n;
  document.getElementById("it").textContent = c.t;
  document.getElementById("ih").textContent = "HP " + c.h;
  document.getElementById("iw").textContent = c.i;
  document.getElementById("de").classList.add("sl");
  document.getElementById("dm").classList.remove("sl");
  document.getElementById("dh").classList.remove("sl");
  show(2);
}

function pd(n) {
  S.di = n;
  document.getElementById("de").classList.remove("sl");
  document.getElementById("dm").classList.remove("sl");
  document.getElementById("dh").classList.remove("sl");
  document.getElementById("d" + (n === 0 ? "e" : n === 1 ? "m" : "h")).classList.add("sl");
}

document.getElementById("btnFight").onclick = function() {
  if (!S.ci) return;
  fight(S.ci, S.di);
};

function fight(id, di) {
  var ib = (id === "j");
  var d = CH[id];
  S.ch = {id:id, n:d.n, t:d.t, e:d.e, h:d.h, d:d};
  S.lb = 3;
  S.rn = 0;
  S.an = false;
  S.ti = null;
  var pool = Q.filter(function(q) { return q.d <= di; });
  if (pool.length < 5) pool = Q.slice();
  sf(pool);
  S.qs = pool.slice(0, 5);
  document.getElementById("be").textContent = d.e;
  document.getElementById("bn").textContent = d.n;
  document.getElementById("bt").textContent = d.t;
  document.getElementById("ta").innerHTML = "";
  show(3);
  hr();
  eh();
  nr();
}

function hr() {
  var p = document.getElementById("ph");
  var h = "";
  for (var i = 0; i < 3; i++) {
    h += "<span class=\"he" + (i < S.lb ? "" : " lo") + "\">❤️</span>";
  }
  p.innerHTML = h;
}

function eh() {
  var hp = S.ch.h;
  var ch = Math.max(0, hp - S.rn);
  document.getElementById("ehb").style.width = (ch / hp * 100) + "%";
  document.getElementById("eht").textContent = ch + " / " + hp;
}

function nr() {
  if (S.rn >= 5) {
    if (S.lb > 0) { wwin(); return; }
    else { lose(); return; }
  }
  S.an = false;
  document.getElementById("ta").innerHTML = "";
  var q = S.qs[S.rn];
  document.getElementById("pt").textContent = "第 " + (S.rn + 1) + " / 5 題";
  document.getElementById("qt").textContent = "情境";
  document.getElementById("qx").textContent = q.s + " " + q.q;
  document.getElementById("fb").textContent = "";
  eh();
  var chd = document.getElementById("ch");
  chd.innerHTML = "";
  var opts = sf(q.o.slice());
  for (var i = 0; i < opts.length; i++) {
    var b = document.createElement("div");
    b.className = "chc";
    b.textContent = opts[i];
    b._q = q;
    b._a = opts[i];
    b.onclick = function() { ha(this, this._q, this._a); };
    chd.appendChild(b);
  }
  S.tl = 15;
  document.getElementById("tbar").style.width = "100%";
  document.getElementById("td").textContent = 15;
  st();
}

function st() {
  clearInterval(S.ti);
  S.ti = setInterval(function() {
    S.tl--;
    document.getElementById("td").textContent = S.tl;
    document.getElementById("tbar").style.width = Math.max(0, (S.tl / 15) * 100) + "%";
    if (S.tl <= 0 && !S.an) {
      clearInterval(S.ti);
      ht();
    }
  }, 1000);
}

function ht() {
  if (S.an) return;
  S.an = true;
  S.lb--;
  hr();
  var btns = document.querySelectorAll("#ch .chc");
  for (var i = 0; i < btns.length; i++) btns[i].disabled = true;
  document.getElementById("fb").textContent = "時間到！";
  document.getElementById("fb").style.color = "#f44336";
  st2("w");
  setTimeout(function() {
    if (S.lb <= 0) { lose(); return; }
    S.rn++;
    nr();
  }, 1500);
}

function ha(btn, q, ans) {
  if (S.an) return;
  S.an = true;
  clearInterval(S.ti);
  var btns = document.querySelectorAll("#ch .chc");
  for (var i = 0; i < btns.length; i++) btns[i].disabled = true;
  var ok = (ans === q.a);
  if (ok) {
    btn.classList.add("cr");
    document.getElementById("fb").textContent = "正確！";
    document.getElementById("fb").style.color = "#4caf50";
  } else {
    btn.classList.add("wr");
    S.lb--;
    hr();
    var btns2 = document.querySelectorAll("#ch .chc");
    for (var i = 0; i < btns2.length; i++) {
      if (btns2[i].textContent === q.a) btns2[i].classList.add("cr");
    }
    document.getElementById("fb").textContent = "正確答案是：" + q.a;
    document.getElementById("fb").style.color = "#f44336";
    st2("w");
  }
  setTimeout(function() {
    if (S.lb <= 0) { lose(); return; }
    S.rn++;
    nr();
  }, 1200);
}

function st2(type) {
  var d = S.ch.d;
  if (!d[type]) return;
  var lines = d[type];
  var txt = Array.isArray(lines) ? pk(lines) : lines;
  document.getElementById("ta").innerHTML = "<div class=\"ta\"><div class=\"ts\">" + d.n + "：</div><div class=\"tt\">" + txt + "</div></div>";
}

function wwin() {
  show(4);
  var d = S.ch.d;
  document.getElementById("re").textContent = "🎉";
  document.getElementById("rt").textContent = "勝利！";
  document.getElementById("rs").textContent = "你擊敗了 " + d.n + "！";
  if (S.clr.indexOf(S.ch.id) === -1) S.clr.push(S.ch.id);
  var ex = document.getElementById("rx");
  if (S.clr.length >= 9 && S.clr.indexOf("j") === -1) {
    ex.innerHTML = "<div class=\"um\">隱藏 BOSS 【史丹利】 現身了！！快去挑戰他！</div>";
    S.bu = true;
  } else if (S.clr.indexOf("j") !== -1) {
    ex.innerHTML = "<div class=\"um\">你連史丹利都擊敗了！" + d.l + "</div>";
    S.bu = false;
  } else {
    ex.innerHTML = "<div class=\"ct\">" + d.n + "：" + d.v + "</div>";
  }
  var btn = document.getElementById("rb");
  btn.textContent = S.bu ? "挑戰 BOSS" : "繼續";
  btn._boss = S.bu;
}

function lose() {
  show(4);
  var d = S.ch.d;
  document.getElementById("re").textContent = "💀";
  document.getElementById("rt").textContent = "敗北...";
  document.getElementById("rs").textContent = "你被 " + d.n + " 擊敗了";
  document.getElementById("rx").innerHTML = "<div class=\"ct\">" + d.n + "：" + d.l + "</div>";
  var btn = document.getElementById("rb");
  btn.textContent = "再試一次";
  btn._boss = false;
}

document.getElementById("rb").onclick = function() {
  if (this.textContent === "再試一次") { fight(S.ci, S.di); return; }
  if (this.textContent === "挑戰 BOSS") { oi("j"); return; }
  if (S.clr.indexOf("j") !== -1) {
    show(0);
    return;
  }
  show(1);
};
</script>
</body>
</html>
