<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexicon Arena 詞彙競技場</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI','Noto Sans TC',sans-serif}
body{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.container{width:100%;max-width:640px}
.screen{display:none;background:rgba(255,255,255,0.06);backdrop-filter:blur(12px);border-radius:24px;padding:32px;border:1px solid rgba(255,255,255,0.1);color:#fff;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.screen.active{display:block}
h1{font-size:2rem;text-align:center;margin-bottom:8px;background:linear-gradient(135deg,#f093fb,#f5576c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{text-align:center;color:rgba(255,255,255,0.6);margin-bottom:24px;font-size:0.95rem}
.btn{background:linear-gradient(135deg,#667eea,#764ba2);border:none;color:#fff;padding:14px 32px;border-radius:12px;font-size:1.1rem;cursor:pointer;transition:transform .2s,box-shadow .2s;font-weight:600;width:100%}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(102,126,234,0.4)}
.btn-sm{padding:10px 20px;font-size:0.9rem;width:auto}
.btn-secondary{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2)}
.btn-secondary:hover{background:rgba(255,255,255,0.2);box-shadow:none}
.character-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.char-card{background:rgba(255,255,255,0.08);border-radius:16px;padding:16px 8px;text-align:center;cursor:pointer;transition:all .3s;border:2px solid transparent;position:relative}
.char-card:hover:not(.locked):not(.cleared){background:rgba(255,255,255,0.15);transform:translateY(-4px)}
.char-card.selected{border-color:#667eea;background:rgba(102,126,234,0.2)}
.char-card.locked{opacity:0.4;cursor:not-allowed}
.char-card.cleared{opacity:0.5;border-color:#4caf50}
.char-card.cleared::after{content:"✓";position:absolute;top:6px;right:10px;color:#4caf50;font-weight:bold;font-size:1.2rem}
.char-card .emoji{font-size:2.4rem;display:block;margin-bottom:4px}
.char-card .name{font-size:0.85rem;font-weight:600}
.char-card .title{font-size:0.65rem;color:rgba(255,255,255,0.5);margin-top:2px}
.char-card .hp-text{font-size:0.6rem;color:rgba(255,255,255,0.4);margin-top:4px}
.boss-badge{background:linear-gradient(135deg,#f093fb,#f5576c);font-size:0.5rem;padding:2px 8px;border-radius:20px;position:absolute;top:-6px;right:-6px;font-weight:700;color:#fff}
.battle-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.opponent-info{text-align:center;flex:1}
.opponent-info .emoji{font-size:3rem;display:block}
.opponent-info .name{font-size:1.2rem;font-weight:700;margin-top:4px}
.opponent-info .title{font-size:0.75rem;color:rgba(255,255,255,0.5)}
.hp-section{flex:1;text-align:center}
.hp-label{font-size:0.75rem;color:rgba(255,255,255,0.6);margin-bottom:4px}
.hp-bar-wrap{background:rgba(255,255,255,0.1);border-radius:10px;height:16px;overflow:hidden;position:relative}
.hp-bar{height:100%;border-radius:10px;transition:width .5s ease;background:linear-gradient(90deg,#f5576c,#ff6b6b)}
.hp-bar.player-hp{background:linear-gradient(90deg,#667eea,#45b7d1)}
.hp-text-num{font-size:0.7rem;margin-top:2px}
.vs-text{font-size:1.4rem;font-weight:900;background:linear-gradient(135deg,#f093fb,#f5576c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:0 12px}
.question-area{background:rgba(255,255,255,0.05);border-radius:16px;padding:20px;margin-bottom:20px;text-align:center}
.q-type{font-size:0.75rem;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.q-text{font-size:1.15rem;line-height:1.6;margin-bottom:6px}
.q-hint{font-size:0.8rem;color:rgba(255,255,255,0.4);font-style:italic}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.choice{background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px;text-align:center;cursor:pointer;transition:all .2s;font-size:1rem;color:#fff}
.choice:hover{background:rgba(255,255,255,0.15);border-color:#667eea}
.choice.correct{background:rgba(76,175,80,0.3);border-color:#4caf50;animation:pulse .4s}
.choice.wrong{background:rgba(244,67,54,0.3);border-color:#f44336;animation:shake .4s}
.choice:disabled{cursor:not-allowed;opacity:0.7}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.player-status{display:flex;justify-content:center;gap:6px;margin-top:12px}
.heart{font-size:1.3rem;transition:all .3s}
.heart.lost{opacity:0.2;transform:scale(0.8)}
.round-info{text-align:center;font-size:0.8rem;color:rgba(255,255,255,0.4);margin-bottom:12px}
.result-screen{text-align:center;padding:20px 0}
.result-screen .big-emoji{font-size:5rem;display:block;margin-bottom:12px}
.result-screen .result-title{font-size:1.6rem;font-weight:700;margin-bottom:8px}
.result-screen .result-sub{color:rgba(255,255,255,0.6);margin-bottom:20px}
.unlock-msg{background:rgba(255,193,7,0.1);border:1px solid rgba(255,193,7,0.3);border-radius:12px;padding:12px;margin-bottom:16px;font-size:0.9rem;animation:glow 1.5s infinite alternate}
@keyframes glow{from{box-shadow:0 0 8px rgba(255,193,7,0.2)}to{box-shadow:0 0 20px rgba(255,193,7,0.4)}}
.btn-group{display:flex;gap:10px;flex-wrap:wrap}
.btn-group .btn{flex:1;min-width:120px}
.timer-bar{height:4px;background:rgba(255,255,255,0.1);border-radius:4px;margin-bottom:16px;overflow:hidden}
.timer-bar-inner{height:100%;background:linear-gradient(90deg,#667eea,#f5576c);border-radius:4px;transition:width 1s linear;width:100%}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.progress-text{font-size:0.8rem;color:rgba(255,255,255,0.4)}
.boss-reveal{animation:bossReveal 1s ease}
@keyframes bossReveal{0%{transform:scale(0) rotate(-180deg);opacity:0}60%{transform:scale(1.2) rotate(10deg)}100%{transform:scale(1) rotate(0deg);opacity:1}}
</style>
</head>
<body>
<div class="container" id="app">
  <!-- Start Screen -->
  <div class="screen active" id="screen-start">
    <h1>⚔️ Lexicon Arena</h1>
    <p class="subtitle">詞彙競技場 — 用英文單字擊敗所有對手！</p>
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-size:4rem;margin-bottom:12px">📖</div>
      <p style="color:rgba(255,255,255,0.7);font-size:0.95rem;line-height:1.7">
        題目會給出單字的 <strong>定義</strong>、<strong>同義詞</strong> 或 <strong>反義詞</strong>，<br>
        從四個選項中選出正確答案。<br>
        答對扣對手 HP，答錯你失去一條命。<br>
        <span style="color:#f5576c">自由選擇對手！擊敗全部 9 位解鎖隱藏 BOSS 史丹利！</span>
      </p>
    </div>
    <button class="btn" onclick="startGame()">開始挑戰</button>
  </div>

  <!-- Character Select -->
  <div class="screen" id="screen-char">
    <h1>👥 選擇對手</h1>
    <p class="subtitle">擊敗當前對手解鎖下一位</p>
    <div class="character-grid" id="charGrid"></div>
    <button class="btn btn-secondary" onclick="showStart()">← 返回</button>
  </div>

  <!-- Battle Screen -->
  <div class="screen" id="screen-battle">
    <div class="top-bar">
      <span class="progress-text" id="progressText">第 1 / 5 題</span>
      <span style="font-size:0.8rem;color:rgba(255,255,255,0.4)">⏱ 15s</span>
    </div>
    <div class="timer-bar"><div class="timer-bar-inner" id="timerBar"></div></div>
    <div class="battle-header">
      <div class="player-status" id="playerHearts"></div>
      <div class="vs-text">⚡</div>
      <div class="opponent-info">
        <span class="emoji" id="battleEmoji">😈</span>
        <div class="name" id="battleName">對手</div>
        <div class="title" id="battleTitle">稱號</div>
      </div>
    </div>
    <div class="hp-section">
      <div class="hp-label">對手 HP</div>
      <div class="hp-bar-wrap"><div class="hp-bar" id="enemyHpBar" style="width:100%"></div></div>
      <div class="hp-text-num" id="enemyHpText">10 / 10</div>
    </div>
    <div class="question-area">
      <div class="q-type" id="qType">DEFINITION</div>
      <div class="q-text" id="qText">Loading...</div>
      <div class="q-hint" id="qHint"></div>
    </div>
    <div class="choices" id="choices"></div>
    <div style="text-align:center;margin-top:8px">
      <span style="font-size:0.75rem;color:rgba(255,255,255,0.3)" id="feedbackMsg"></span>
    </div>
  </div>

  <!-- Result Screen -->
  <div class="screen" id="screen-result">
    <div class="result-screen">
      <span class="big-emoji" id="resultEmoji">🎉</span>
      <div class="result-title" id="resultTitle">勝利！</div>
      <div class="result-sub" id="resultSub">你擊敗了對手！</div>
      <div id="resultExtra"></div>
      <div class="btn-group">
        <button class="btn" id="resultBtn" onclick="nextAfterResult()">繼續</button>
        <button class="btn btn-secondary" onclick="showCharSelect()">選單</button>
      </div>
    </div>
  </div>

  <!-- Victory Screen -->
  <div class="screen" id="screen-victory">
    <div class="result-screen">
      <span class="big-emoji" id="victoryEmoji">🏆</span>
      <div class="result-title" id="victoryTitle">你贏了！</div>
      <div class="result-sub" id="victorySub">全部通關！</div>
      <div id="victoryExtra"></div>
      <div class="btn-group" style="margin-top:20px">
        <button class="btn" onclick="resetGame()">再玩一次</button>
      </div>
    </div>
  </div>
</div>

<script>
const CHARACTERS = [
  {id:'dingdang',name:'叮噹哥',title:'閒聊高手',emoji:'🔔',hp:3,unlock:0},
  {id:'linger',name:'鈴兒',title:'鈴聲清脆',emoji:'🔊',hp:4,unlock:1},
  {id:'shaoyun',name:'少云老師',title:'博學多聞',emoji:'👨‍🏫',hp:5,unlock:2},
  {id:'qinshihuang',name:'秦始皇',title:'千古一帝',emoji:'👑',hp:6,unlock:3},
  {id:'tigress',name:'母老虎',title:'霸氣凜然',emoji:'🐯',hp:7,unlock:4},
  {id:'rongrong',name:'榮榮兒',title:'時尚達人',emoji:'💅',hp:8,unlock:5},
  {id:'qijie',name:'綺姐',title:'優雅貴族',emoji:'🌹',hp:9,unlock:6},
  {id:'karen',name:'凱倫',title:'職場菁英',emoji:'💼',hp:10,unlock:7},
  {id:'xinger',name:'星兒',title:'閃耀新星',emoji:'⭐',hp:12,unlock:8},
];
const BOSS = {id:'stanley',name:'史丹利',title:'詞彙魔王 👹',emoji:'🦹',hp:16,unlock:9};

const QUESTIONS = [
  // --- EASY (B2) ---
  {type:'DEFINITION',text:'「存在於各處、無所不在的」',answer:'Ubiquitous',options:['Ubiquitous','Sporadic','Trivial','Obscure'],diff:'easy'},
  {type:'SYNONYM',text:'「Very careful and precise」的同義詞是？',answer:'Meticulous',options:['Meticulous','Slovenly','Hasty','Reckless'],diff:'easy'},
  {type:'DEFINITION',text:'「能快速恢復、適應力強的」',answer:'Resilient',options:['Resilient','Fragile','Stagnant','Passive'],diff:'easy'},
  {type:'SYNONYM',text:'「Fluent and persuasive in speaking」的同義詞是？',answer:'Eloquent',options:['Eloquent','Inarticulate','Hesitant','Mumble'],diff:'easy'},
  {type:'ANTONYM',text:'「Pragmatic」的反義詞是？',answer:'Idealistic',options:['Idealistic','Practical','Rational','Tactical'],diff:'easy'},
  {type:'DEFINITION',text:'「可有多種解讀、模稜兩可的」',answer:'Ambiguous',options:['Ambiguous','Explicit','Candid','Blunt'],diff:'easy'},
  {type:'SYNONYM',text:'「Very convincing or persuasive」的同義詞是？',answer:'Compelling',options:['Compelling','Feeble','Tedious','Shallow'],diff:'easy'},
  {type:'ANTONYM',text:'「Candid」的反義詞是？',answer:'Dishonest',options:['Dishonest','Frank','Open','Sincere'],diff:'easy'},
  {type:'DEFINITION',text:'「基於隨機選擇而非理性判斷的」',answer:'Arbitrary',options:['Arbitrary','Rational','Systematic','Methodical'],diff:'easy'},
  {type:'SYNONYM',text:'「Hardworking and thorough」的同義詞是？',answer:'Diligent',options:['Diligent','Lethargic','Negligent','Lackadaisical'],diff:'easy'},
  {type:'DEFINITION',text:'「簡短到近乎粗魯的說話方式」',answer:'Curt',options:['Curt','Verbose','Elaborate','Prolix'],diff:'easy'},
  {type:'SYNONYM',text:'「Showing great care and perseverance」的同義詞是？',answer:'Assiduous',options:['Assiduous','Indolent','Lackadaisical','Nonchalant'],diff:'easy'},
  // --- MEDIUM (C1) ---
  {type:'DEFINITION',text:'「短暫的、轉瞬即逝的」',answer:'Ephemeral',options:['Ephemeral','Eternal','Enduring','Perpetual'],diff:'medium'},
  {type:'DEFINITION',text:'「為了利益而諂媚奉承的人」',answer:'Sycophant',options:['Sycophant','Mentor','Critic','Rival'],diff:'medium'},
  {type:'SYNONYM',text:'「To place side by side for comparison」的同義詞是？',answer:'Juxtapose',options:['Juxtapose','Separate','Scatter','Disperse'],diff:'medium'},
  {type:'DEFINITION',text:'「草率應付、缺乏熱忱的」',answer:'Perfunctory',options:['Perfunctory','Zealous','Meticulous','Thorough'],diff:'medium'},
  {type:'SYNONYM',text:'「To echo or resound repeatedly」的同義詞是？',answer:'Reverberate',options:['Reverberate','Muffle','Silence','Dampen'],diff:'medium'},
  {type:'DEFINITION',text:'「令人困惑的問題或難題」',answer:'Conundrum',options:['Conundrum','Solution','Certainty','Truism'],diff:'medium'},
  {type:'ANTONYM',text:'「Gregarious」的反義詞是？',answer:'Antisocial',options:['Antisocial','Sociable','Outgoing','Friendly'],diff:'medium'},
  {type:'DEFINITION',text:'「話不多的、簡潔的」',answer:'Laconic',options:['Laconic','Garrulous','Voluble','Loqacious'],diff:'medium'},
  {type:'SYNONYM',text:'「To make something unclear or confusing」的同義詞是？',answer:'Obfuscate',options:['Obfuscate','Clarify','Illuminate','Elucidate'],diff:'medium'},
  {type:'DEFINITION',text:'「幸運巧合發生的」',answer:'Fortuitous',options:['Fortuitous','Deliberate','Inevitable','Calculated'],diff:'medium'},
  {type:'SYNONYM',text:'「Excessively showy or ornate」的同義詞是？',answer:'Ostentatious',options:['Ostentatious','Modest','Plain','Subdued'],diff:'medium'},
  {type:'ANTONYM',text:'「Benevolent」的反義詞是？',answer:'Malevolent',options:['Malevolent','Kind','Generous','Compassionate'],diff:'medium'},
  // --- HARD (C1+) ---
  {type:'DEFINITION',text:'「使用長而艱澀字詞的」',answer:'Sesquipedalian',options:['Sesquipedalian','Succinct','Concise','Pithy'],diff:'hard'},
  {type:'DEFINITION',text:'「具有敏銳洞察力的」',answer:'Perspicacious',options:['Perspicacious','Obtuse','Shallow','Dull'],diff:'hard'},
  {type:'ANTONYM',text:'「Recalcitrant」的反義詞是？',answer:'Compliant',options:['Compliant','Stubborn','Obstinate','Defiant'],diff:'hard'},
  {type:'SYNONYM',text:'「Pleasantly unexpected or fortunate」的同義詞是？',answer:'Serendipitous',options:['Serendipitous','Unlucky','Expected','Routine'],diff:'hard'},
  {type:'DEFINITION',text:'「寬宏大量的、不計較的」',answer:'Magnanimous',options:['Magnanimous','Vindictive','Petty','Spiteful'],diff:'hard'},
  {type:'SYNONYM',text:'「Excessively obedient or attentive」的同義詞是？',answer:'Obsequious',options:['Obsequious','Assertive','Domineering','Defiant'],diff:'hard'},
  {type:'DEFINITION',text:'「極度美麗的」（沒錯，這是真英文）',answer:'Pulchritudinous',options:['Pulchritudinous','Hideous','Grotesque','Repulsive'],diff:'hard'},
  {type:'DEFINITION',text:'「把人丟出窗外的行為」',answer:'Defenestration',options:['Defenestration','Incendiary','Immurement','Asphyxiation'],diff:'hard'},
  {type:'SYNONYM',text:'「Harsh and critical in tone」的同義詞是？',answer:'Caustic',options:['Caustic','Gentle','Mild','Tepid'],diff:'hard'},
  {type:'ANTONYM',text:'「Esoteric」的反義詞是？',answer:'Mainstream',options:['Mainstream','Obscure','Arcane','Recondite'],diff:'hard'},
  {type:'DEFINITION',text:'「假裝不關心、刻意冷淡的態度」',answer:'Nonchalant',options:['Nonchalant','Anxious','Fervent','Zealous'],diff:'hard'},
  {type:'SYNONYM',text:'「To criticize or correct gently」的同義詞是？',answer:'Admonish',options:['Admonish','Applaud','Praise','Commend'],diff:'hard'},
  // --- EXPERT (BOSS only) ---
  {type:'DEFINITION',text:'「無法被滿足或平息」',answer:'Insatiable',options:['Insatiable','Sated','Content','Satisfied'],diff:'expert'},
  {type:'SYNONYM',text:'「Seeming real but not being so」的同義詞是？',answer:'Specious',options:['Specious','Genuine','Authentic','Sincere'],diff:'expert'},
  {type:'ANTONYM',text:'「Taciturn」的反義詞是？',answer:'Talkative',options:['Talkative','Reticent','Reserved','Mute'],diff:'expert'},
  {type:'DEFINITION',text:'「用貶低對方的方式稱讚自己」',answer:'Sycophantic',options:['Sycophantic','Magnanimous','Altruistic','Humble'],diff:'expert'},
  {type:'SYNONYM',text:'「To make something seem less serious」的同義詞是？',answer:'Mitigate',options:['Mitigate','Exacerbate','Aggravate','Intensify'],diff:'expert'},
  {type:'DEFINITION',text:'「不可撤銷的、無法改變的」',answer:'Irrevocable',options:['Irrevocable','Reversible','Amendable','Provisional'],diff:'expert'},
];

const Q_PER_ROUND = 5;
const MAX_LIVES = 3;
const TIME_LIMIT = 15;

let state = {
  screen:'start',
  cleared:[],
  bossUnlocked:false,
  currentChar:null,
  isBoss:false,
  lives:MAX_LIVES,
  roundNum:0,
  questions:[],
  answered:false,
  timer:null,
  timeLeft:TIME_LIMIT,
  totalCleared:0
};

function shuffle(arr){for(let i=arr.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}

function showStart(){resetGame();showScreen('screen-start')}

function getWordBank(diff){
  const diffOrder=['easy','medium','hard','expert'];
  const idx=diffOrder.indexOf(diff);
  let pool=QUESTIONS.filter(q=>diffOrder.indexOf(q.diff)<=idx);
  if(pool.length<Q_PER_ROUND)pool=shuffle([...QUESTIONS]);
  return shuffle(pool).slice(0,Q_PER_ROUND);
}

function startGame(){
  state.cleared=[];
  state.bossUnlocked=false;
  state.totalCleared=0;
  showCharSelect();
}

function showCharSelect(){
  state.screen='char';
  showScreen('screen-char');
  renderCharGrid();
}

function renderCharGrid(){
  const grid=document.getElementById('charGrid');
  let html='';
  const allChars=[...CHARACTERS,BOSS];
  allChars.forEach(c=>{
    const isBoss=c.id===BOSS.id;
    const isCleared=state.cleared.includes(c.id);
    const isLocked=isBoss && state.cleared.length<9;
    const cls=['char-card'];
    if(isCleared)cls.push('cleared');
    if(isLocked)cls.push('locked');
    html+=`<div class="${cls.join(' ')}" onclick="selectChar('${c.id}')">
      ${isBoss?'<span class="boss-badge">BOSS</span>':''}
      <span class="emoji">${c.emoji}</span>
      <div class="name">${c.name}</div>
      <div class="title">${c.title}</div>
      <div class="hp-text">HP ${c.hp}</div>
    </div>`;
  });
  grid.innerHTML=html;
}

function selectChar(id){
  const allChars=[...CHARACTERS,BOSS];
  const char=allChars.find(c=>c.id===id);
  if(!char)return;
  if(char.id===BOSS.id && state.cleared.length<9)return;
  if(state.cleared.includes(id))return;
  startBattle(char);
}

function startBattle(char){
  state.currentChar=char;
  state.isBoss=char.id===BOSS.id;
  state.lives=MAX_LIVES;
  state.roundNum=0;
  state.answered=false;
  state.screen='battle';
  showScreen('screen-battle');
  const diff=char.id===BOSS.id?'expert':char.hp<=5?'easy':char.hp<=8?'medium':'hard';
  state.questions=getWordBank(diff);
  document.getElementById('battleEmoji').textContent=char.emoji;
  document.getElementById('battleName').textContent=char.name;
  document.getElementById('battleTitle').textContent=char.title;
  renderHearts();
  renderEnemyHp();
  nextRound();
}

function renderHearts(){
  const container=document.getElementById('playerHearts');
  let html='';
  for(let i=0;i<MAX_LIVES;i++)html+=`<span class="heart ${i<state.lives?'':'lost'}">❤️</span>`;
  container.innerHTML=html;
}

function renderEnemyHp(){
  const hp=state.currentChar.hp;
  const remaining=state.questions.filter((_,i)=>i<state.roundNum&&state._lastCorrect).length;
  const curHp=Math.max(0,hp-state.roundNum);
  const pct=(curHp/hp)*100;
  document.getElementById('enemyHpBar').style.width=pct+'%';
  document.getElementById('enemyHpText').textContent=`${curHp} / ${hp}`;
}

function nextRound(){
  if(state.roundNum>=Q_PER_ROUND){
    if(state.lives>0){showWin();return}
    else{showLose();return}
  }
  state.answered=false;
  const q=state.questions[state.roundNum];
  document.getElementById('progressText').textContent=`第 ${state.roundNum+1} / ${Q_PER_ROUND} 題`;
  document.getElementById('qType').textContent=q.type;
  document.getElementById('qText').textContent=q.text;
  document.getElementById('qHint').textContent='';
  document.getElementById('feedbackMsg').textContent='';
  renderEnemyHp();
  const choices=document.getElementById('choices');
  choices.innerHTML='';
  const opts=shuffle([...q.options]);
  opts.forEach(o=>{
    const btn=document.createElement('div');
    btn.className='choice';
    btn.textContent=o;
    btn.onclick=()=>handleAnswer(btn,q,o);
    choices.appendChild(btn);
  });
  state.timeLeft=TIME_LIMIT;
  document.getElementById('timerBar').style.width='100%';
  startTimer();
}

function startTimer(){
  clearInterval(state.timer);
  state.timer=setInterval(()=>{
    state.timeLeft--;
    const pct=(state.timeLeft/TIME_LIMIT)*100;
    document.getElementById('timerBar').style.width=Math.max(0,pct)+'%';
    if(state.timeLeft<=0){
      clearInterval(state.timer);
      if(!state.answered)handleTimeout();
    }
  },1000);
}

function handleTimeout(){
  if(state.answered)return;
  state.answered=true;
  state._lastCorrect=false;
  state.lives--;
  renderHearts();
  document.querySelectorAll('.choice').forEach(b=>b.disabled=true);
  document.getElementById('feedbackMsg').textContent='⏰ 時間到！';
  document.getElementById('feedbackMsg').style.color='#f44336';
  setTimeout(()=>{
    if(state.lives<=0){showLose();return}
    state.roundNum++;
    nextRound();
  },1200);
}

function handleAnswer(btn,q,ans){
  if(state.answered)return;
  state.answered=true;
  clearInterval(state.timer);
  document.querySelectorAll('.choice').forEach(b=>b.disabled=true);
  const correct=ans.toLowerCase()===q.answer.toLowerCase();
  state._lastCorrect=correct;
  if(correct){
    btn.classList.add('correct');
    document.getElementById('feedbackMsg').textContent='✅ 正確！';
    document.getElementById('feedbackMsg').style.color='#4caf50';
  }else{
    btn.classList.add('wrong');
    state.lives--;
    renderHearts();
    const correctBtn=Array.from(document.querySelectorAll('.choice')).find(b=>b.textContent.toLowerCase()===q.answer.toLowerCase());
    if(correctBtn)correctBtn.classList.add('correct');
    document.getElementById('feedbackMsg').textContent=`❌ 正確答案是：${q.answer}`;
    document.getElementById('feedbackMsg').style.color='#f44336';
  }
  setTimeout(()=>{
    if(state.lives<=0){showLose();return}
    state.roundNum++;
    nextRound();
  },1200);
}

function showWin(){
  state.screen='result';
  showScreen('screen-result');
  document.getElementById('resultEmoji').textContent='🎉';
  document.getElementById('resultTitle').textContent='勝利！';
  document.getElementById('resultSub').textContent=`你擊敗了 ${state.currentChar.name}！`;
  state.totalCleared++;
  if(!state.cleared.includes(state.currentChar.id))state.cleared.push(state.currentChar.id);
  const extra=document.getElementById('resultExtra');
  if(state.cleared.length>=9 && !state.cleared.includes(BOSS.id)){
    extra.innerHTML=`<div class="unlock-msg boss-reveal">🦹 隱藏 BOSS 【史丹利】 現身了！！快去挑戰他！</div>`;
    state.bossUnlocked=true;
  }else if(state.cleared.includes(BOSS.id)){
    extra.innerHTML=`<div class="unlock-msg">🏆 你擊敗了所有人！真正的詞彙大師！</div>`;
  }else{
    extra.innerHTML='';
  }
  document.getElementById('resultBtn').textContent=state.bossUnlocked?'挑戰 BOSS':'繼續';
}

function showLose(){
  state.screen='result';
  showScreen('screen-result');
  document.getElementById('resultEmoji').textContent='💀';
  document.getElementById('resultTitle').textContent='敗北...';
  document.getElementById('resultSub').textContent=`你被 ${state.currentChar.name} 擊敗了`;
  document.getElementById('resultExtra').innerHTML='<p style="color:rgba(255,255,255,0.5);font-size:0.9rem">再接再厲！</p>';
  document.getElementById('resultBtn').textContent='再試一次';
}

function nextAfterResult(){
  const btn=document.getElementById('resultBtn');
  if(btn.textContent==='再試一次'){startBattle(state.currentChar);return;}
  if(state.cleared.includes(BOSS.id)){showVictory();return;}
  showCharSelect();
}

function showVictory(){
  state.screen='victory';
  showScreen('screen-victory');
  document.getElementById('victoryEmoji').textContent='🏆';
  document.getElementById('victoryTitle').textContent='恭喜通關！';
  document.getElementById('victorySub').textContent='你擊敗了所有挑戰者，包含隱藏 BOSS 史丹利！';
  document.getElementById('victoryExtra').innerHTML='<p style="color:rgba(255,255,255,0.6);font-size:1rem;margin-top:8px">真正的詞彙大師，就是你 👑</p>';
}

function resetGame(){
  clearInterval(state.timer);
  state={screen:'start',cleared:[],bossUnlocked:false,currentChar:null,isBoss:false,lives:MAX_LIVES,roundNum:0,questions:[],answered:false,timer:null,timeLeft:TIME_LIMIT,totalCleared:0};
  showScreen('screen-start');
}
</script>
</body>
</html>
